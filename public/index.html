    // ========================
    // Step: Apply
    // ========================
    function ApplyStep({ template, plan, applyResult, setApplyResult, setError, loading, setLoading, onNext }) {
      const [confirmed, setConfirmed] = useState(false);

      const handleApply = async () => {
        setLoading(true); setError(null);
        try {
          const result = await api.call('POST', '/apply', {
            template,
            snapshotId: plan?.snapshotId
          });
          setApplyResult(result);
        } catch (e) {
          setError(e.message);
        }
        setLoading(false);
      };

      const handleRollback = async () => {
        if (!plan?.snapshotId) return;
        setLoading(true);
        try {
          const result = await api.call('POST', '/rollback', { snapshotId: plan.snapshotId });
          alert(result.message);
        } catch (e) {
          setError(e.message);
        }
        setLoading(false);
      };

      return (
        <div>
          <div className="card">
            <div className="card-header">
              <h2>Apply Configuration</h2>
              <p>This will create policy rules in your ZIA tenant and activate the changes.</p>
            </div>

            {!applyResult ? (
              <div>
                <div className="alert alert-warning">
                  ⚠ <strong>Caution:</strong> This will make real changes to your ZIA tenant. A snapshot has been
                  taken for best-effort rollback. Created rules will be ordered above any conflicting existing rules.
                </div>

                <div className="toggle-item" style={{marginBottom:'1rem'}}>
                  <label onClick={() => setConfirmed(!confirmed)} style={{cursor:'pointer'}}>
                    I understand this will modify my ZIA tenant configuration and have reviewed the plan.
                  </label>
                  <div className={`toggle-switch ${confirmed ? 'active' : ''}`}
                    onClick={() => setConfirmed(!confirmed)}>
                    <div className="toggle-knob"></div>
                  </div>
                </div>

                <div className="btn-group">
                  <button className="btn btn-success" onClick={handleApply} disabled={!confirmed || loading}>
                    {loading ? <><span className="spinner"></span> Applying...</> : '🚀 Apply Changes'}
                  </button>
                </div>
              </div>
            ) : (
              <div>
                {applyResult.activated ? (
                  <div className="alert alert-success">
                    ✓ Changes applied and activated successfully!
                    Applied {applyResult.summary.applied} rules with {applyResult.summary.errors} errors.
                  </div>
                ) : (
                  <div className="alert alert-danger">
                    Changes were applied but activation may have failed. Check errors below.
                  </div>
                )}

                {applyResult.applied?.length > 0 && (
                  <div style={{marginBottom:'1rem'}}>
                    <h3 style={{fontSize:'14px', marginBottom:'8px', color:'var(--accent-green)'}}>Applied ({applyResult.applied.length})</h3>
                    {applyResult.applied.map((a, i) => (
                      <div key={i} style={{padding:'6px 12px', borderBottom:'1px solid var(--border)', fontSize:'13px'}}>
                        <span className={`badge ${a.type==='CREATE' ? 'badge-create' : 'badge-update'}`}>{a.type}</span>
                        {' '}<span className="badge badge-category">{a.category}</span>
                        {' '}{a.name}
                        {a.id && <span style={{color:'var(--text-muted)', marginLeft:'8px'}}>ID: {a.id}</span>}
                      </div>
                    ))}
                  </div>
                )}

                {applyResult.errors?.length > 0 && (
                  <div style={{marginBottom:'1rem'}}>
                    <h3 style={{fontSize:'14px', marginBottom:'8px', color:'var(--accent-red)'}}>Errors ({applyResult.errors.length})</h3>
                    {applyResult.errors.map((e, i) => (
                      <div key={i} className="alert alert-danger" style={{fontSize:'13px'}}>
                        {e.category} / {e.name}: {e.error}
                      </div>
                    ))}
                  </div>
                )}

                <div className="btn-group">
                  <button className="btn btn-danger" onClick={handleRollback} disabled={loading}>
                    ↩ Attempt Rollback
                  </button>
                  <button className="btn btn-primary" onClick={onNext}>
                    View Audit Log →
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ========================
    // Step: Audit Log
    // ========================
    function AuditStep({ auditLogs, setAuditLogs, setError }) {
      const [loaded, setLoaded] = useState(false);

      useEffect(() => {
        if (!loaded) {
          api.call('GET', '/audit/logs').then(setAuditLogs).catch(e => setError(e.message));
          setLoaded(true);
        }
      }, [loaded]);

      return (
        <div>
          <div className="card">
            <div className="card-header">
              <h2>Audit Log</h2>
              <p>Complete record of all actions taken during this session.</p>
            </div>

            <div className="btn-group" style={{marginTop:0, marginBottom:'1rem'}}>
              <button className="btn btn-ghost btn-sm" onClick={() => {
                window.open('/api/audit/export/csv', '_blank');
              }}>📥 Export CSV</button>
              <button className="btn btn-ghost btn-sm" onClick={() => {
                window.open('/api/audit/export/json', '_blank');
              }}>📥 Export JSON</button>
              <button className="btn btn-ghost btn-sm" onClick={() => {
                api.call('GET', '/audit/logs').then(setAuditLogs).catch(e => setError(e.message));
              }}>🔄 Refresh</button>
            </div>

            <div style={{maxHeight:'500px', overflowY:'auto', border:'1px solid var(--border)', borderRadius:'var(--radius)'}}>
              <div className="log-entry" style={{background:'var(--bg-secondary)', position:'sticky', top:0}}>
                <span style={{fontWeight:600}}>Timestamp</span>
                <span style={{fontWeight:600}}>Action</span>
                <span style={{fontWeight:600}}>Status</span>
                <span style={{fontWeight:600}}>Details</span>
              </div>
              {auditLogs.length === 0 ? (
                <div style={{padding:'2rem', textAlign:'center', color:'var(--text-muted)'}}>No log entries yet</div>
              ) : (
                auditLogs.map((entry, i) => (
                  <div key={i} className="log-entry">
                    <span className="ts">{new Date(entry.timestamp).toLocaleString()}</span>
                    <span className="action">{entry.action}</span>
                    <span className={entry.status === 'success' ? 'status-ok' : 'status-err'}>
                      {entry.status}
                    </span>
                    <span style={{color:'var(--text-secondary)', wordBreak:'break-all'}}>
                      {typeof entry.details === 'object' ? JSON.stringify(entry.details) : entry.details}
                    </span>
                  </div>
                ))
              )}
            </div>
          </div>
        </div>
      );
    }

    // ========================
    // Step: Policy Catalog (no auth required)
    // ========================
    function CatalogStep() {
      const [catalog, setCatalog] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [openTiers, setOpenTiers] = useState({});
      const [openFws, setOpenFws] = useState({});
      const [openPolicies, setOpenPolicies] = useState({});

      useEffect(() => {
        let cancelled = false;
        setLoading(true);
        fetch('/api/catalog').then(r => r.json()).then(data => {
          if (!cancelled) { setCatalog(data); setLoading(false); }
        }).catch(e => {
          if (!cancelled) { setError(e.message); setLoading(false); }
        });
        return () => { cancelled = true; };
      }, []);

      const toggle = (map, setMap, key) => setMap(prev => ({ ...prev, [key]: !prev[key] }));

      const tierMeta = {
        STRICT: { icon: '🔒', label: 'Strict', color: 'var(--accent-red)' },
        BALANCED: { icon: '⚖️', label: 'Balanced', color: 'var(--accent-blue)' },
        PERMISSIVE: { icon: '🔓', label: 'Permissive', color: 'var(--accent-green)' },
        ZTH_EBOOK: { icon: '🏥', label: 'Zero Trust Hospital', color: 'var(--accent-purple)' }
      };

      const policyLabels = {
        urlFiltering: '🌐 URL Filtering',
        firewallFiltering: '🔥 Cloud Firewall',
        sslInspection: '🔒 SSL/TLS Inspection',
        sandbox: '📦 Cloud Sandbox',
        dnsSecurity: '🛡️ DNS Security',
        fileTypeControl: '📄 File Type Control',
        cloudAppControl: '☁️ Cloud App Control',
        dlp: '🔍 Data Loss Prevention',
        malwareProtection: '🦠 Malware Protection',
        advancedSettings: '⚙️ Advanced Settings'
      };

      function getActionClass(action) {
        if (!action) return '';
        const a = String(action).toUpperCase();
        if (a.includes('BLOCK')) return 'BLOCK';
        if (a === 'ALLOW') return 'ALLOW';
        if (a === 'CAUTION') return 'CAUTION';
        if (a.includes('DECRYPT') && !a.includes('NOT')) return 'DECRYPT';
        if (a.includes('DO_NOT_DECRYPT')) return 'DO_NOT_DECRYPT';
        if (a.includes('QUARANTINE')) return 'QUARANTINE';
        if (a.includes('INSPECT')) return 'INSPECT';
        return '';
      }

      function renderRule(rule, idx) {
        const actionClass = getActionClass(rule.action);
        return (
          <div className="catalog-rule" key={idx}>
            <div>
              <span className="catalog-rule-name">{rule.name}</span>
              <span className={`catalog-rule-action ${actionClass}`}>{rule.action}</span>
              {rule.severity && <span className="catalog-rule-action" style={{background:'var(--bg-secondary)',color:'var(--text-muted)',marginLeft:'4px'}}>{rule.severity.replace('RULE_SEVERITY_','')}</span>}
            </div>
            {rule.description && <div className="catalog-rule-detail">{rule.description}</div>}
            {rule.urlCategories && rule.urlCategories.length > 0 && (
              <div className="catalog-rule-cats">Categories: {rule.urlCategories.join(', ')}</div>
            )}
            {rule.nwApplications && rule.nwApplications.length > 0 && (
              <div className="catalog-rule-cats">Apps: {rule.nwApplications.join(', ')}</div>
            )}
            {rule.dictionaryNames && rule.dictionaryNames.length > 0 && (
              <div className="catalog-rule-cats">Dictionaries: {rule.dictionaryNames.join(', ')}</div>
            )}
            {rule.preferredEngines && rule.preferredEngines.length > 0 && (
              <div className="catalog-rule-cats">Preferred Engines: {rule.preferredEngines.join(', ')}</div>
            )}
            {rule.fileTypes && rule.fileTypes.length > 0 && (
              <div className="catalog-rule-cats">File Types: {Array.isArray(rule.fileTypes) ? rule.fileTypes.join(', ') : rule.fileTypes}</div>
            )}
            {rule.firstTimeOperation && (
              <div className="catalog-rule-cats">First-time: {rule.firstTimeOperation}</div>
            )}
            {rule.withoutContentInspection && (
              <div className="catalog-rule-cats" style={{color:'var(--accent-amber)'}}>Without Content Inspection</div>
            )}
            {rule.complianceMapping && rule.complianceMapping.length > 0 && (
              <div style={{marginTop:'4px'}}>
                {rule.complianceMapping.map((c, ci) => (
                  <span key={ci} className="catalog-compliance-tag">{c.framework} {c.id}: {c.name}</span>
                ))}
              </div>
            )}
          </div>
        );
      }

      function renderPolicies(policies, tierKey, fwKey) {
        return Object.entries(policies).map(([policyType, rules]) => {
          const pKey = `${tierKey}-${fwKey}-${policyType}`;
          const isOpen = openPolicies[pKey];
          const count = Array.isArray(rules) ? rules.length : 1;
          const label = policyLabels[policyType] || policyType;
          return (
            <div className="catalog-policy-group" key={policyType}>
              <div className="catalog-policy-header" onClick={() => toggle(openPolicies, setOpenPolicies, pKey)}>
                <span className="arrow" style={{fontSize:'10px',transition:'transform 0.2s',transform:isOpen?'rotate(90deg)':'none'}}>▶</span>
                {label}
                <span className="catalog-count">{count}</span>
              </div>
              {isOpen && Array.isArray(rules) && rules.map((r, i) => renderRule(r, i))}
              {isOpen && !Array.isArray(rules) && rules.settings && (
                <div className="catalog-rule">
                  <div className="catalog-rule-name">{rules.name}</div>
                  {rules.description && <div className="catalog-rule-detail">{rules.description}</div>}
                  <div className="catalog-rule-cats" style={{whiteSpace:'pre-wrap'}}>{JSON.stringify(rules.settings, null, 2)}</div>
                  {rules.complianceMapping && rules.complianceMapping.length > 0 && (
                    <div style={{marginTop:'4px'}}>
                      {rules.complianceMapping.map((c, ci) => (
                        <span key={ci} className="catalog-compliance-tag">{c.framework} {c.id}: {c.name}</span>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        });
      }

      if (loading) return <div className="catalog-loading">Loading policy catalog...</div>;
      if (error) return <div className="alert alert-danger">Failed to load catalog: {error}</div>;
      if (!catalog) return null;

      return (
        <div>
          <div className="card">
            <div className="card-header">
              <h2>📖 Policy Catalog</h2>
              <p>Browse every rule across all security tiers and compliance frameworks. No authentication required. Click a tier to expand, then drill into frameworks and policy types to see individual rules with compliance mappings.</p>
            </div>

            <div className="explainer">
              <strong>How to use:</strong> Expand a security tier below, then pick a compliance framework (or "No Framework" for general-purpose).
              Each policy module shows every rule that would be created, including the action, URL categories, dictionaries, protocols, and
              mapped compliance controls. Use this to decide which tier and framework is right for your organization before connecting to ZIA.
            </div>

            {Object.entries(catalog.tiers).map(([tierKey, fwMap]) => {
              const meta = tierMeta[tierKey] || { icon: '?', label: tierKey, color: 'var(--text-primary)' };
              const isTierOpen = openTiers[tierKey];
              const totalRules = Object.values(fwMap).reduce((sum, fw) =>
                sum + Object.values(fw.ruleCounts || {}).reduce((s, c) => s + c, 0), 0
              );

              return (
                <div className="catalog-tier" key={tierKey}>
                  <div className="catalog-tier-header" onClick={() => toggle(openTiers, setOpenTiers, tierKey)}>
                    <span className="arrow" style={{transform:isTierOpen?'rotate(90deg)':'none'}}>▶</span>
                    <span>{meta.icon}</span>
                    <span style={{color: meta.color}}>{meta.label}</span>
                    <span className="catalog-count">{Object.keys(fwMap).length} framework{Object.keys(fwMap).length !== 1 ? 's' : ''}</span>
                  </div>
                  {isTierOpen && Object.entries(fwMap).map(([fwKey, fwData]) => {
                    const fKey = `${tierKey}-${fwKey}`;
                    const isFwOpen = openFws[fKey];
                    const fwLabel = fwKey === 'NONE' ? 'No Framework (General)' :
                      (catalog.frameworks[fwKey] ? `${catalog.frameworks[fwKey].name} — ${catalog.frameworks[fwKey].fullName}` : fwKey);
                    const rc = fwData.ruleCounts || {};
                    const totalFwRules = Object.values(rc).reduce((s, c) => s + c, 0);

                    return (
                      <div className="catalog-fw" key={fwKey}>
                        <div className="catalog-fw-header" onClick={() => toggle(openFws, setOpenFws, fKey)}>
                          <span className="arrow" style={{fontSize:'10px',transition:'transform 0.2s',transform:isFwOpen?'rotate(90deg)':'none'}}>▶</span>
                          <span>{fwKey === 'NONE' ? '🌐' : '📋'}</span>
                          <span>{fwLabel}</span>
                          <span className="catalog-count">{totalFwRules} rules</span>
                        </div>
                        {isFwOpen && (
                          <div>
                            <div className="catalog-summary" style={{margin:'0.5rem 0 0.25rem 1rem'}}>
                              {Object.entries(rc).map(([pt, c]) => (
                                <span key={pt} className="catalog-summary-chip">{policyLabels[pt]?.split(' ').slice(1).join(' ') || pt}: {c}</span>
                              ))}
                            </div>
                            {renderPolicies(fwData.policies, tierKey, fwKey)}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ========================
    // Step: Mobile Admin Portal (ZCC)
    // ========================
    function MobileAdminStep({ setError, loading, setLoading, config }) {
      const [wizStep, setWizStep] = useState('select'); // select, configure, review, apply
      const [profiles, setProfiles] = useState(null);
      const [selectedFwdId, setSelectedFwdId] = useState(null);
      const [selectedAppId, setSelectedAppId] = useState(null);
      const [applyResult, setApplyResult] = useState(null);

      // Best-practice setting toggles
      const [fwdSettings, setFwdSettings] = useState({
        ztunnel2: true,
        transparentRedirect: true,
        dropIpv6: true,
        allTrafficT2: true
      });
      const [appSettings, setAppSettings] = useState({
        // Tunnel bypass lists
        packetTunnelExcludeList: '',
        packetTunnelExcludeListForIPv6: '',
        packetTunnelIncludeList: '',
        packetTunnelIncludeListForIPv6: '',
        // VPN / source port
        vpnGateways: '',
        sourcePortBasedBypasses: '',
        // IPv6 / DNS settings (toggles)
        disableParallelIpv4AndIPv6: true,
        useDefaultAdapterForDNS: false,
        updateDnsSearchOrder: false,
        disableDNSRouteExclusion: false,
        enforceSplitDNS: false,
        bypassDNSTrafficUsingUDPProxy: false,
        truncateLargeUDPDNSResponse: false,
        prioritizeDnsExclusions: false,
        // DNS lists
        packetTunnelDnsExcludeList: '',
        packetTunnelDnsIncludeList: '',
        dnsPriorityOrdering: '',
        dnsPriorityOrderingForTrustedDnsCriteria: '',
        customDNS: '',
        // App/service IDs
        appServiceIds: '',
        bypassAppIds: '',
        bypassCustomAppIds: '',
        // Passwords (leave blank to skip)
        logoutpassword: '',
        uninstallpassword: '',
        disablepassword: '',
        exitPassword: '',
        zdxDisablePassword: '',
        zdDisablePassword: '',
        zpaDisablePassword: '',
        zdpDisablePassword: '',
        zccRevertPassword: '',
        zccFailCloseSettingsExitUninstallPassword: ''
      });

      // Fetch profiles on mount
      const fetchProfiles = async () => {
        setLoading(true); setError(null);
        try {
          const data = await api.call('GET', '/zcc/profiles');
          setProfiles(data);
          if (data.errors?.length > 0) {
            setError('Some profile fetches failed: ' + data.errors.join('; '));
          }
        } catch (e) { setError(e.message); }
        setLoading(false);
      };

      useEffect(() => { fetchProfiles(); }, []);

      // Build the PATCH/POST payloads from selected settings
      const buildPayloads = () => {
        const payloads = { forwardingProfileId: selectedFwdId, appProfileId: selectedAppId, settings: {} };

        if (selectedFwdId && profiles) {
          const fwdProfile = profiles.forwardingProfiles.find(p => String(p.id) === String(selectedFwdId));
          // Build forwarding profile actions from best practices
          const fwdActions = {};
          if (fwdSettings.ztunnel2 || fwdSettings.transparentRedirect || fwdSettings.dropIpv6 || fwdSettings.allTrafficT2) {
            fwdActions.forwardingProfileActions = [{
              actionType: '1',
              networkType: '2',
              primaryTransport: fwdSettings.ztunnel2 ? '2' : '1',
              enablePacketTunnel: '1',
              redirectWebTraffic: fwdSettings.transparentRedirect ? '1' : '0',
              useTunnel2ForProxiedWebTraffic: fwdSettings.allTrafficT2 ? '1' : '0',
              allowTLSFallback: '0',
              systemProxy: '0',
              dropIpv6Traffic: fwdSettings.dropIpv6 ? '1' : '0',
              dropIpv6IncludeTrafficInT2: fwdSettings.dropIpv6 ? '1' : '0',
              dropIpv6TrafficInIpv6Network: fwdSettings.dropIpv6 ? '1' : '0',
              blockUnreachableDomainsTraffic: '0',
              pathMtuDiscovery: '0',
              latencyBasedZenEnablement: '0',
              mtuForZadapter: 1500,
              TLSTimeout: 90,
              DTLSTimeout: 90,
              UDPTimeout: 90,
              zenProbeInterval: 600,
              zenProbeSampleSize: 2,
              zenThresholdLimit: 0,
              tunnel2FallbackType: '0'
            }];
            fwdActions.forwardingProfileZpaActions = [{
              actionType: '1',
              networkType: '2',
              primaryTransport: fwdSettings.ztunnel2 ? '2' : '1',
              latencyBasedServerMTEnablement: 0,
              latencyBasedZpaServerEnablement: '0',
              mtuForZadapter: 1500,
              TLSTimeout: 90,
              DTLSTimeout: 90,
              lbsZpaProbeInterval: 600,
              lbsZpaProbeSampleSize: 2,
              lbsZpaThresholdLimit: 0,
              sendTrustedNetworkResultToZpa: '0'
            }];
          }
          payloads.settings.fwd = fwdActions;
        }

        if (selectedAppId) {
          // PATCH payload — only send non-empty/non-default allowlisted fields
          const patch = {};
          // Toggle fields — send if true
          const toggleFields = ['disableParallelIpv4AndIPv6','useDefaultAdapterForDNS','updateDnsSearchOrder',
            'disableDNSRouteExclusion','enforceSplitDNS','bypassDNSTrafficUsingUDPProxy',
            'truncateLargeUDPDNSResponse','prioritizeDnsExclusions'];
          for (const f of toggleFields) {
            if (appSettings[f]) patch[f] = '1';
          }
          // String fields — send if non-empty
          const strFields = ['packetTunnelExcludeList','packetTunnelExcludeListForIPv6',
            'packetTunnelIncludeList','packetTunnelIncludeListForIPv6',
            'vpnGateways','sourcePortBasedBypasses',
            'packetTunnelDnsExcludeList','packetTunnelDnsIncludeList',
            'dnsPriorityOrdering','dnsPriorityOrderingForTrustedDnsCriteria','customDNS',
            'appServiceIds','bypassAppIds','bypassCustomAppIds',
            'logoutpassword','uninstallpassword','disablepassword','exitPassword',
            'zdxDisablePassword','zdDisablePassword','zpaDisablePassword',
            'zdpDisablePassword','zccRevertPassword','zccFailCloseSettingsExitUninstallPassword'];
          for (const f of strFields) {
            if (appSettings[f]) patch[f] = appSettings[f];
          }
          payloads.settings.app = patch;
        }

        return payloads;
      };

      const handleApply = async () => {
        setLoading(true); setError(null);
        try {
          const payloads = buildPayloads();
          const result = await api.call('POST', '/zcc/apply', payloads);
          setApplyResult(result);
          setWizStep('apply');
        } catch (e) { setError(e.message); }
        setLoading(false);
      };

      // === SELECT STEP: pick which profiles to edit ===
      if (wizStep === 'select') {
        if (loading || !profiles) {
          return (<div className="card"><div className="card-header"><h2>📱 Mobile Admin Portal</h2><p>Loading profiles from ZCC...</p></div><div style={{textAlign:'center',padding:'2rem'}}><span className="spinner"></span></div></div>);
        }
        return (
          <div>
            <div className="card">
              <div className="card-header">
                <h2>📱 Mobile Admin Portal — Select Profiles</h2>
                <p>Select existing profiles to apply best-practice settings. Create dummy profiles in the ZCC Admin Portal first if needed.</p>
              </div>

              <div className="explainer">
                <strong>How this works:</strong> This tool reads your existing ZCC profiles via GET, then applies changes using PATCH (app profiles) and POST edit (forwarding profiles). It will NOT create new profiles — you must create them manually in the ZCC Mobile Admin Portal first.
              </div>

              <div className="card" style={{background:'var(--bg-input)', marginTop:'1rem'}}>
                <h3 style={{fontSize:'14px', marginBottom:'0.75rem'}}>Forwarding Profiles ({profiles.forwardingProfiles.length})</h3>
                {profiles.forwardingProfiles.length === 0 ? (
                  <div style={{fontSize:'13px', color:'var(--text-muted)'}}>No forwarding profiles found. Create one in ZCC Admin Portal first.</div>
                ) : profiles.forwardingProfiles.map(fp => (
                  <div key={fp.id} className={`tier-card ${String(selectedFwdId) === String(fp.id) ? 'selected' : ''}`}
                    onClick={() => setSelectedFwdId(fp.id)}
                    style={{cursor:'pointer', marginBottom:'0.5rem', padding:'0.75rem'}}>
                    <div style={{fontSize:'13px', fontWeight:600}}>{fp.name || '(unnamed)'}</div>
                    <div style={{fontSize:'11px', color:'var(--text-muted)'}}>ID: {fp.id} · Active: {fp.active ? 'Yes' : 'No'} · Actions: {fp.actionCount}</div>
                  </div>
                ))}
              </div>

              <div className="card" style={{background:'var(--bg-input)', marginTop:'1rem'}}>
                <h3 style={{fontSize:'14px', marginBottom:'0.75rem'}}>App Profiles — Windows ({profiles.appProfiles.length})</h3>
                {profiles.appProfiles.length === 0 ? (
                  <div style={{fontSize:'13px', color:'var(--text-muted)'}}>No Windows app profiles found. Create one in ZCC Admin Portal first.</div>
                ) : profiles.appProfiles.map(ap => (
                  <div key={ap.id} className={`tier-card ${String(selectedAppId) === String(ap.id) ? 'selected' : ''}`}
                    onClick={() => setSelectedAppId(ap.id)}
                    style={{cursor:'pointer', marginBottom:'0.5rem', padding:'0.75rem'}}>
                    <div style={{fontSize:'13px', fontWeight:600}}>{ap.name || '(unnamed)'}</div>
                    <div style={{fontSize:'11px', color:'var(--text-muted)'}}>ID: {ap.id} · Active: {ap.active ? 'Yes' : 'No'} · FWD Profile: {ap.forwardingProfileName || 'None'}</div>
                  </div>
                ))}
              </div>

              {profiles.errors?.length > 0 && (
                <div className="alert alert-danger" style={{marginTop:'1rem'}}>
                  {profiles.errors.map((e, i) => <div key={i}>⚠ {e}</div>)}
                </div>
              )}

              <div className="btn-group">
                <button className="btn btn-ghost" onClick={fetchProfiles} disabled={loading}>🔄 Refresh</button>
                <button className="btn btn-primary"
                  onClick={() => setWizStep('configure')}
                  disabled={!selectedFwdId && !selectedAppId}>
                  Configure Settings →
                </button>
              </div>
            </div>
          </div>
        );
      }

      // === CONFIGURE STEP: choose which best practices to apply ===
      if (wizStep === 'configure') {
        return (
          <div>
            <div className="card">
              <div className="card-header">
                <h2>📱 Configure Best Practices</h2>
                <p>Select which settings to apply to your chosen profiles.</p>
              </div>

              {selectedFwdId && (
                <div className="card" style={{background:'var(--bg-input)', marginTop:'1rem'}}>
                  <h3 style={{fontSize:'14px', marginBottom:'0.75rem', color:'var(--accent-cyan)'}}>Forwarding Profile Settings (POST edit)</h3>
                  <div className="toggle-group">
                    {[
                      { key: 'ztunnel2', label: 'Z-Tunnel 2.0', desc: 'Use Z-Tunnel 2.0 as primary transport (recommended)' },
                      { key: 'transparentRedirect', label: 'Transparent Redirection', desc: 'Redirect web traffic transparently through Z-Tunnel' },
                      { key: 'dropIpv6', label: 'Drop IPv6 Traffic', desc: 'Drop all IPv6 to prevent tunnel bypass' },
                      { key: 'allTrafficT2', label: 'All Traffic via Z-Tunnel 2.0', desc: 'Route all proxied web traffic through Z-Tunnel 2.0' }
                    ].map(t => (
                      <div className="toggle-item" key={t.key}>
                        <div>
                          <label onClick={() => setFwdSettings(s => ({...s, [t.key]: !s[t.key]}))}>{t.label}</label>
                          <div className="form-hint">{t.desc}</div>
                        </div>
                        <div className={`toggle-switch ${fwdSettings[t.key] ? 'active' : ''}`}
                          onClick={() => setFwdSettings(s => ({...s, [t.key]: !s[t.key]}))}>
                          <div className="toggle-knob"></div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {selectedAppId && (
                <div className="card" style={{background:'var(--bg-input)', marginTop:'1rem'}}>
                  <h3 style={{fontSize:'14px', marginBottom:'0.75rem', color:'var(--accent-cyan)'}}>App Profile Settings (PATCH — allowlisted fields only)</h3>
                  <p style={{fontSize:'12px', color:'var(--text-muted)', marginBottom:'1rem'}}>Only non-empty fields will be sent. Leave fields blank to skip them. Include existing values when adding to lists.</p>

                  <h4 style={{fontSize:'13px', color:'var(--accent-blue)', margin:'1rem 0 0.5rem'}}>Network & IPv6</h4>
                  <div className="toggle-group">
                    {[
                      { key: 'disableParallelIpv4AndIPv6', label: 'Disable Parallel IPv4/IPv6', desc: 'Prevents IPv6 bypass when tunnel is active' },
                      { key: 'useDefaultAdapterForDNS', label: 'Use Default Adapter for DNS', desc: 'Route DNS through the default network adapter' },
                      { key: 'updateDnsSearchOrder', label: 'Update DNS Search Order', desc: 'Modify DNS search order for ZCC' },
                      { key: 'disableDNSRouteExclusion', label: 'Disable DNS Route Exclusion', desc: 'Prevent DNS route exclusions' },
                      { key: 'enforceSplitDNS', label: 'Enforce Split DNS', desc: 'Force split DNS resolution' },
                      { key: 'bypassDNSTrafficUsingUDPProxy', label: 'Bypass DNS via UDP Proxy', desc: 'Route DNS bypass traffic through UDP proxy' },
                      { key: 'truncateLargeUDPDNSResponse', label: 'Truncate Large UDP DNS', desc: 'Truncate oversized UDP DNS responses' },
                      { key: 'prioritizeDnsExclusions', label: 'Prioritize DNS Exclusions', desc: 'DNS exclusions take priority over inclusions' }
                    ].map(t => (
                      <div className="toggle-item" key={t.key}>
                        <div>
                          <label onClick={() => setAppSettings(s => ({...s, [t.key]: !s[t.key]}))}>{t.label}</label>
                          <div className="form-hint">{t.desc}</div>
                        </div>
                        <div className={`toggle-switch ${appSettings[t.key] ? 'active' : ''}`}
                          onClick={() => setAppSettings(s => ({...s, [t.key]: !s[t.key]}))}>
                          <div className="toggle-knob"></div>
                        </div>
                      </div>
                    ))}
                  </div>

                  <h4 style={{fontSize:'13px', color:'var(--accent-blue)', margin:'1.5rem 0 0.5rem'}}>Tunnel Bypass Lists</h4>
                  {[
                    { key: 'packetTunnelExcludeList', label: 'IP Bypass List (IPv4)', placeholder: '10.0.0.1,192.168.1.0/24' },
                    { key: 'packetTunnelExcludeListForIPv6', label: 'IP Bypass List (IPv6)', placeholder: 'fd00::/8' },
                    { key: 'packetTunnelIncludeList', label: 'IP Include List (IPv4)', placeholder: '0.0.0.0/0' },
                    { key: 'packetTunnelIncludeListForIPv6', label: 'IP Include List (IPv6)', placeholder: '' },
                    { key: 'vpnGateways', label: 'VPN Gateways', placeholder: 'vpn.company.com' },
                    { key: 'sourcePortBasedBypasses', label: 'Source Port Bypasses', placeholder: '5060,5061' }
                  ].map(f => (
                    <div className="form-group" key={f.key} style={{marginBottom:'0.75rem'}}>
                      <label className="form-label" style={{fontSize:'12px'}}>{f.label}</label>
                      <input type="text" value={appSettings[f.key]}
                        onChange={e => setAppSettings(s => ({...s, [f.key]: e.target.value}))}
                        placeholder={f.placeholder} style={{fontSize:'12px'}} />
                    </div>
                  ))}

                  <h4 style={{fontSize:'13px', color:'var(--accent-blue)', margin:'1.5rem 0 0.5rem'}}>DNS Configuration</h4>
                  {[
                    { key: 'packetTunnelDnsExcludeList', label: 'DNS Domain Exclusions', placeholder: '*.internal.corp' },
                    { key: 'packetTunnelDnsIncludeList', label: 'DNS Domain Inclusions', placeholder: '*.company.com' },
                    { key: 'dnsPriorityOrdering', label: 'DNS Priority Ordering', placeholder: '' },
                    { key: 'dnsPriorityOrderingForTrustedDnsCriteria', label: 'DNS Priority (Trusted Network)', placeholder: '' },
                    { key: 'customDNS', label: 'Custom DNS Servers', placeholder: '10.0.0.53' }
                  ].map(f => (
                    <div className="form-group" key={f.key} style={{marginBottom:'0.75rem'}}>
                      <label className="form-label" style={{fontSize:'12px'}}>{f.label}</label>
                      <input type="text" value={appSettings[f.key]}
                        onChange={e => setAppSettings(s => ({...s, [f.key]: e.target.value}))}
                        placeholder={f.placeholder} style={{fontSize:'12px'}} />
                    </div>
                  ))}

                  <h4 style={{fontSize:'13px', color:'var(--accent-blue)', margin:'1.5rem 0 0.5rem'}}>App & Service Bypass</h4>
                  {[
                    { key: 'appServiceIds', label: 'App Service IDs', placeholder: 'Comma-separated IDs' },
                    { key: 'bypassAppIds', label: 'Bypass App IDs (pre-defined)', placeholder: 'Comma-separated IDs' },
                    { key: 'bypassCustomAppIds', label: 'Bypass Custom App IDs', placeholder: 'Comma-separated IDs' }
                  ].map(f => (
                    <div className="form-group" key={f.key} style={{marginBottom:'0.75rem'}}>
                      <label className="form-label" style={{fontSize:'12px'}}>{f.label}</label>
                      <input type="text" value={appSettings[f.key]}
                        onChange={e => setAppSettings(s => ({...s, [f.key]: e.target.value}))}
                        placeholder={f.placeholder} style={{fontSize:'12px'}} />
                    </div>
                  ))}

                  <h4 style={{fontSize:'13px', color:'var(--accent-blue)', margin:'1.5rem 0 0.5rem'}}>Passwords (leave blank to skip)</h4>
                  {[
                    { key: 'logoutpassword', label: 'Logout Password' },
                    { key: 'uninstallpassword', label: 'Uninstall Password' },
                    { key: 'disablepassword', label: 'Disable Password' },
                    { key: 'exitPassword', label: 'Exit Password' },
                    { key: 'zpaDisablePassword', label: 'ZPA Disable Password' },
                    { key: 'zdxDisablePassword', label: 'ZDX Disable Password' },
                    { key: 'zdDisablePassword', label: 'ZD Disable Password' },
                    { key: 'zdpDisablePassword', label: 'ZDP Disable Password' },
                    { key: 'zccRevertPassword', label: 'ZCC Revert Password' },
                    { key: 'zccFailCloseSettingsExitUninstallPassword', label: 'Fail Close Exit/Uninstall Password' }
                  ].map(f => (
                    <div className="form-group" key={f.key} style={{marginBottom:'0.75rem'}}>
                      <label className="form-label" style={{fontSize:'12px'}}>{f.label}</label>
                      <input type="password" value={appSettings[f.key]}
                        onChange={e => setAppSettings(s => ({...s, [f.key]: e.target.value}))}
                        placeholder="Leave blank to skip" style={{fontSize:'12px'}} />
                    </div>
                  ))}
                </div>
              )}

              <div className="btn-group">
                <button className="btn btn-ghost" onClick={() => setWizStep('select')}>← Back</button>
                <button className="btn btn-primary" onClick={() => setWizStep('review')}>Review Changes →</button>
              </div>
            </div>
          </div>
        );
      }

      // === REVIEW STEP ===
      if (wizStep === 'review') {
        const payloads = buildPayloads();
        return (
          <div>
            <div className="card">
              <div className="card-header">
                <h2>📱 Review ZCC Changes</h2>
                <p>Review the changes before applying.</p>
              </div>

              {payloads.forwardingProfileId && payloads.settings?.fwd && (
                <div style={{marginBottom:'1rem'}}>
                  <h3 style={{fontSize:'14px', color:'var(--accent-cyan)', marginBottom:'8px'}}>
                    Forwarding Profile (POST edit) — ID: {payloads.forwardingProfileId}
                  </h3>
                  <div style={{fontSize:'12px', color:'var(--text-secondary)', marginBottom:'8px'}}>
                    The full existing profile will be fetched via GET, merged with these settings, then POSTed back.
                  </div>
                  <pre style={{fontSize:'11px', fontFamily:'IBM Plex Mono', color:'var(--text-secondary)',
                    background:'var(--bg-input)', padding:'12px', borderRadius:'4px', overflow:'auto', maxHeight:'250px',
                    whiteSpace:'pre-wrap'}}>
                    {JSON.stringify(payloads.settings.fwd, null, 2)}
                  </pre>
                </div>
              )}

              {payloads.appProfileId && payloads.settings?.app && Object.keys(payloads.settings.app).length > 0 && (
                <div style={{marginBottom:'1rem'}}>
                  <h3 style={{fontSize:'14px', color:'var(--accent-cyan)', marginBottom:'8px'}}>
                    App Profile (PATCH) — ID: {payloads.appProfileId}
                  </h3>
                  <div style={{fontSize:'12px', color:'var(--text-secondary)', marginBottom:'8px'}}>
                    Only these allowlisted fields will be sent via PATCH. Existing values are preserved.
                  </div>
                  <pre style={{fontSize:'11px', fontFamily:'IBM Plex Mono', color:'var(--text-secondary)',
                    background:'var(--bg-input)', padding:'12px', borderRadius:'4px', overflow:'auto', maxHeight:'200px',
                    whiteSpace:'pre-wrap'}}>
                    {JSON.stringify(payloads.settings.app, null, 2)}
                  </pre>
                </div>
              )}

              <div className="btn-group">
                <button className="btn btn-ghost" onClick={() => setWizStep('configure')}>← Back</button>
                <button className="btn btn-primary" onClick={handleApply} disabled={loading}>
                  {loading ? <><span className="spinner"></span> Applying...</> : '🚀 Apply Changes'}
                </button>
              </div>
            </div>
          </div>
        );
      }

      // === APPLY RESULTS ===
      if (wizStep === 'apply' && applyResult) {
        return (
          <div>
            <div className="card">
              <div className="card-header"><h2>📱 ZCC Apply Results</h2></div>

              <div className="alert" style={{
                background: applyResult.errors?.length === 0 ? 'var(--accent-green-dim)' : 'var(--accent-amber-dim)',
                borderColor: applyResult.errors?.length === 0 ? 'var(--accent-green)' : 'var(--accent-amber)'
              }}>
                <strong>{applyResult.errors?.length === 0 ? '✅ All changes applied!' : '⚠ Applied with errors'}</strong>
                <div style={{fontSize:'13px', marginTop:'8px'}}>
                  Applied: {applyResult.summary?.applied || 0} · Errors: {applyResult.summary?.errors || 0}
                </div>
              </div>

              {applyResult.applied?.length > 0 && (
                <div style={{marginTop:'1rem'}}>
                  <h3 style={{fontSize:'14px', marginBottom:'8px', color:'var(--accent-green)'}}>Applied</h3>
                  {applyResult.applied.map((item, i) => (
                    <div key={i} style={{fontSize:'12px', color:'var(--text-secondary)', marginBottom:'4px'}}>
                      ✅ {item.type} {item.category}: {item.name}
                    </div>
                  ))}
                </div>
              )}

              {applyResult.errors?.length > 0 && (
                <div style={{marginTop:'1rem'}}>
                  <h3 style={{fontSize:'14px', marginBottom:'8px', color:'var(--accent-red)'}}>Errors</h3>
                  {applyResult.errors.map((item, i) => (
                    <div key={i} style={{fontSize:'12px', color:'var(--accent-red)', marginBottom:'4px'}}>
                      ❌ {item.category}: {item.error}
                    </div>
                  ))}
                  {applyResult.errors.some(e => e.error?.includes('401')) && (
                    <div className="alert alert-danger" style={{marginTop:'0.75rem', fontSize:'12px'}}>
                      <strong>401 Unauthorized — API Client Permissions</strong>
                      <p style={{margin:'4px 0'}}>The PATCH endpoint for app profiles requires write permission. In ZIdentity → Integration → API Clients → your client → API Resources, ensure "Client Connector" has <strong>Read/Write</strong> scope (not just Read). The forwarding profile POST edit succeeded, which confirms your token is valid — only the app profile PATCH endpoint is restricted.</p>
                    </div>
                  )}
                </div>
              )}

              <div className="btn-group" style={{marginTop:'1.5rem'}}>
                <button className="btn btn-ghost" onClick={() => { setApplyResult(null); setWizStep('select'); }}>← Start Over</button>
              </div>
            </div>
          </div>
        );
      }

      return null;
    }

    // ========================
    // Step: Bulk Delete
    // ========================
    function BulkDeleteStep({ setError, loading, setLoading }) {
      const [allRules, setAllRules] = useState(null);
      const [selected, setSelected] = useState(new Set());
      const [filterText, setFilterText] = useState('');
      const [deleteResult, setDeleteResult] = useState(null);
      const [fetchLoading, setFetchLoading] = useState(false);
      const [confirmOpen, setConfirmOpen] = useState(false);
      const mountedRef = useRef(true);

      useEffect(() => {
        mountedRef.current = true;
        return () => { mountedRef.current = false; };
      }, []);

      const CATEGORY_MAP = {
        urlFiltering: { label: 'URL Filtering', category: 'url-filtering' },
        firewall: { label: 'Cloud Firewall', category: 'firewall' },
        ssl: { label: 'SSL Inspection', category: 'ssl' },
        sandbox: { label: 'Sandbox', category: 'sandbox' },
        dns: { label: 'DNS Security', category: 'dns' },
        fileType: { label: 'File Type Control', category: 'file-type' },
        dlp: { label: 'DLP Rules', category: 'dlp' },
        dlpEngines: { label: 'DLP Engines (custom)', category: 'dlp-engine' },
        dlpDictionaries: { label: 'DLP Dictionaries (custom)', category: 'dlp-dictionary' }
      };

      const fetchRules = async () => {
        setFetchLoading(true); setDeleteResult(null);
        setAllRules(null);
        setSelected(new Set());
        console.log('[BulkDelete] Starting fetch...');
        try {
          const data = await api.call('GET', '/state/all-rules');
          if (!mountedRef.current) { console.log('[BulkDelete] Component unmounted during fetch, discarding'); return; }

          console.log('[BulkDelete] Raw API response keys:', Object.keys(data || {}));
          // Log each category's data type and count
          Object.entries(data || {}).forEach(([k, v]) => {
            console.log(`[BulkDelete]   ${k}: type=${typeof v}, isArray=${Array.isArray(v)}, length=${Array.isArray(v) ? v.length : 'N/A'}`);
            // Log first rule to check for object-type actions
            if (Array.isArray(v) && v.length > 0) {
              const sample = v[0];
              console.log(`[BulkDelete]   ${k}[0]: id=${sample.id}, name=${sample.name}, action type=${typeof sample.action}, action=${typeof sample.action === 'object' ? JSON.stringify(sample.action) : sample.action}`);
            }
          });

          const safe = {
            urlFiltering: Array.isArray(data?.urlFiltering) ? data.urlFiltering : [],
            firewall: Array.isArray(data?.firewall) ? data.firewall : [],
            ssl: Array.isArray(data?.ssl) ? data.ssl : [],
            sandbox: Array.isArray(data?.sandbox) ? data.sandbox : [],
            dns: Array.isArray(data?.dns) ? data.dns : [],
            fileType: Array.isArray(data?.fileType) ? data.fileType : [],
            dlp: Array.isArray(data?.dlp) ? data.dlp : [],
            dlpEngines: Array.isArray(data?.dlpEngines) ? data.dlpEngines : [],
            dlpDictionaries: Array.isArray(data?.dlpDictionaries) ? data.dlpDictionaries : []
          };

          // Count total rules for debug
          const total = Object.values(safe).reduce((sum, arr) => sum + arr.length, 0);
          console.log(`[BulkDelete] Normalized: ${total} total rules across ${Object.keys(safe).length} categories`);

          setAllRules(safe);
          console.log('[BulkDelete] State updated successfully');
        } catch (e) {
          console.error('[BulkDelete] Fetch error:', e);
          if (mountedRef.current) setError(e.message);
        }
        if (mountedRef.current) setFetchLoading(false);
      };

      // No auto-fetch — user clicks Load Rules (takes ~15s due to API rate limiting)

      // Client-side filter — filters the display, not the fetch
      const matchesFilter = (name) => {
        if (!filterText) return true;
        return (name || '').toLowerCase().includes(filterText.toLowerCase());
      };

      const toggleRule = (key) => {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      };

      const selectAllVisible = () => {
        const all = new Set(selected);
        if (!allRules) return;
        Object.entries(CATEGORY_MAP).forEach(([field, meta]) => {
          const rules = allRules[field];
          if (!Array.isArray(rules)) return;
          rules.forEach(r => {
            if (!r.defaultRule && r.id != null && matchesFilter(r.name))
              all.add(`${meta.category}::${r.id}::${r.name || 'unnamed'}`);
          });
        });
        setSelected(all);
      };

      const handleBulkDelete = async () => {
        setLoading(true); setError(null); setConfirmOpen(false);
        const rules = [];
        selected.forEach(key => {
          const parts = key.split('::');
          if (parts[0] === 'cloud-app') {
            rules.push({ category: 'cloud-app', id: parseInt(parts[1]), name: parts[2], ruleType: parts[3] });
          } else {
            rules.push({ category: parts[0], id: parseInt(parts[1]), name: parts[2] });
          }
        });
        try {
          const result = await api.call('POST', '/bulk-delete', { rules });
          if (!mountedRef.current) return;
          setDeleteResult(result);
          setSelected(new Set());
          fetchRules(); // Refresh
        } catch (e) { if (mountedRef.current) setError(e.message); }
        if (mountedRef.current) setLoading(false);
      };

      // Count total non-default rules
      const countRules = (rules) => {
        if (!Array.isArray(rules)) return { total: 0, filtered: 0 };
        const nonDefault = rules.filter(r => !r.defaultRule);
        const filtered = nonDefault.filter(r => matchesFilter(r.name));
        return { total: nonDefault.length, filtered: filtered.length };
      };

      const renderRuleTable = (rules, catKey, catMeta) => {
        if (!Array.isArray(rules)) return null;
        const visible = rules.filter(r => !r.defaultRule && matchesFilter(r.name));
        const defaults = rules.filter(r => r.defaultRule);
        if (visible.length === 0 && defaults.length === 0) return null;
        return (
          <div key={catKey} style={{marginBottom:'1rem'}}>
            <div style={{fontWeight:600, fontSize:'13px', color:'var(--accent-cyan)', marginBottom:'6px'}}>
              {catMeta.label} ({visible.length} deletable{defaults.length > 0 ? `, ${defaults.length} default` : ''})
            </div>
            {visible.map(r => {
              const key = `${catMeta.category}::${r.id}::${r.name}`;
              return (
                <div key={key} style={{
                  display:'flex', alignItems:'center', gap:'8px', padding:'6px 8px',
                  background: selected.has(key) ? 'var(--accent-red-dim)' : 'var(--bg-input)',
                  borderRadius:'4px', marginBottom:'2px', fontSize:'12px'
                }}>
                  <input type="checkbox" checked={selected.has(key)}
                    onChange={() => toggleRule(key)} />
                  <span style={{flex:1, fontFamily:'IBM Plex Mono'}}>{r.name}</span>
                  <span style={{color:'var(--text-muted)', fontSize:'11px'}}>ID:{r.id} · {typeof r.action === 'string' ? r.action : (r.action ? JSON.stringify(r.action) : '—')}</span>
                </div>
              );
            })}
            {defaults.length > 0 && (
              <div style={{fontSize:'11px', color:'var(--text-muted)', padding:'4px 8px', fontStyle:'italic'}}>
                + {defaults.length} default/predefined rule(s) (cannot be deleted)
              </div>
            )}
          </div>
        );
      };

      return (
        <div>
          <div className="card">
            <div className="card-header">
              <h2>🗑️ Bulk Rule Manager</h2>
              <p>View and delete rules across ZIA policy categories. Default and predefined rules are excluded automatically. Cloud App Control rules must be managed in the ZIA admin portal.</p>
            </div>

            {/* Initial state — no rules loaded yet */}
            {!allRules && !fetchLoading && (
              <div style={{textAlign:'center', padding:'2rem'}}>
                <p style={{color:'var(--text-secondary)', marginBottom:'1rem'}}>
                  Click below to load rules from your ZIA tenant across URL Filtering, Firewall, SSL Inspection,
                  Sandbox, DNS Security, and File Type Control. Takes approximately 7-10 seconds due to API rate limiting.
                </p>
                <button className="btn btn-primary" onClick={fetchRules}>
                  📥 Load All Rules
                </button>
              </div>
            )}

            {/* Loading state */}
            {fetchLoading && (
              <div style={{padding:'2rem', textAlign:'center'}}>
                <span className="spinner"></span>
                <div style={{marginTop:'8px', color:'var(--text-secondary)'}}>
                  Loading rules from 6 policy categories...<br/>
                  <span style={{fontSize:'12px', color:'var(--text-muted)'}}>Takes ~7-10 seconds (API rate limiting)</span>
                </div>
              </div>
            )}

            {allRules && (
              <div>
                <div style={{display:'flex', gap:'8px', alignItems:'center', marginBottom:'1rem'}}>
                  <div className="form-group" style={{flex:1, marginBottom:0}}>
                    <input type="text" value={filterText}
                      onChange={e => setFilterText(e.target.value)}
                      placeholder="Filter rules by name (e.g. ZTH, Sandbox, Block...)" />
                  </div>
                  <button className="btn btn-ghost btn-sm" onClick={fetchRules}>🔄 Refresh</button>
                </div>

                <div style={{display:'flex', gap:'8px', marginBottom:'1rem'}}>
                  <button className="btn btn-ghost btn-sm" onClick={selectAllVisible}>
                    Select All {filterText ? 'Matching' : ''}
                  </button>
                  <button className="btn btn-ghost btn-sm" onClick={() => setSelected(new Set())}>Deselect All</button>
                  <div style={{flex:1}}></div>
                  <span style={{fontSize:'13px', color:'var(--text-secondary)', alignSelf:'center'}}>
                    {selected.size} rule(s) selected
                  </span>
                </div>

                <div style={{maxHeight:'500px', overflowY:'auto', border:'1px solid var(--border)', borderRadius:'var(--radius)', padding:'8px'}}>
                  {Object.entries(CATEGORY_MAP).map(([field, meta]) =>
                    renderRuleTable(allRules[field], field, meta)
                  )}
                </div>

                {selected.size > 0 && !confirmOpen && (
                  <div style={{marginTop:'1rem'}}>
                    <button className="btn" onClick={() => setConfirmOpen(true)}
                      style={{background:'var(--accent-red)', color:'white'}}>
                      🗑️ Delete {selected.size} Rule(s)
                    </button>
                  </div>
                )}

                {confirmOpen && (
                  <div className="alert alert-danger" style={{marginTop:'1rem'}}>
                    <strong>⚠ Confirm Bulk Delete</strong>
                    <p style={{margin:'8px 0'}}>You are about to permanently delete <strong>{selected.size}</strong> rule(s) from your ZIA tenant and activate changes. This cannot be undone.</p>
                    <div style={{display:'flex', gap:'8px'}}>
                      <button className="btn btn-sm" onClick={handleBulkDelete} disabled={loading}
                        style={{background:'var(--accent-red)', color:'white'}}>
                        {loading ? <><span className="spinner"></span> Deleting...</> : '⚠ Yes, Delete All'}
                      </button>
                      <button className="btn btn-ghost btn-sm" onClick={() => setConfirmOpen(false)}>Cancel</button>
                    </div>
                  </div>
                )}
              </div>
            )}

            {deleteResult && (
              <div style={{marginTop:'1rem'}}>
                <div className="alert" style={{background:'var(--bg-input)', borderColor:'var(--border)'}}>
                  <strong>Delete Results:</strong>
                  <div style={{fontSize:'13px', marginTop:'8px'}}>
                    ✅ Deleted: {deleteResult.summary?.deleted || 0} ·
                    ❌ Errors: {deleteResult.summary?.errors || 0} ·
                    ⏭ Skipped: {deleteResult.summary?.skipped || 0} ·
                    {deleteResult.summary?.activated ? '✅ Activated' : '⚠ Not Activated'}
                  </div>
                  {deleteResult.errors?.length > 0 && (
                    <div style={{marginTop:'8px'}}>
                      {deleteResult.errors.map((e, i) => (
                        <div key={i} style={{fontSize:'11px', color:'var(--accent-red)'}}>{e.name}: {e.error}</div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ========================
    // Render
    // ========================
    ReactDOM.render(
      React.createElement(ErrorBoundary, null, React.createElement(App)),
      document.getElementById('app')
    );
  </script>
</body>
</html>
