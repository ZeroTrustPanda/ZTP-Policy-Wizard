<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZeroTrustPanda ZS Policy Wizard v1.5.2 - Zscaler Template Policy Configuration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0e17;
      --bg-secondary: #111827;
      --bg-card: #1a2236;
      --bg-card-hover: #1f2943;
      --bg-input: #0f1629;
      --border: #2a3654;
      --border-focus: #3b82f6;
      --text-primary: #e8ecf4;
      --text-secondary: #8896b3;
      --text-muted: #5c6b8a;
      --accent-blue: #3b82f6;
      --accent-blue-dim: #1e40af;
      --accent-green: #10b981;
      --accent-green-dim: #065f46;
      --accent-amber: #f59e0b;
      --accent-amber-dim: #78350f;
      --accent-red: #ef4444;
      --accent-red-dim: #7f1d1d;
      --accent-purple: #8b5cf6;
      --accent-cyan: #06b6d4;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
      --radius: 8px;
      --radius-lg: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* Layout */
    .app { display: flex; flex-direction: column; min-height: 100vh; }
    .header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-brand .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 16px; color: white;
    }
    .header-brand h1 {
      font-size: 18px; font-weight: 600;
      background: linear-gradient(135deg, var(--text-primary), var(--accent-cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header-brand .tag {
      font-size: 10px; padding: 2px 8px; border-radius: 4px;
      background: var(--accent-blue-dim); color: var(--accent-blue);
      font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
    }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .auth-badge {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
    }
    .auth-badge.connected { background: var(--accent-green-dim); color: var(--accent-green); }
    .auth-badge.disconnected { background: var(--accent-red-dim); color: var(--accent-red); }
    .auth-badge .dot { width: 6px; height: 6px; border-radius: 50%; }
    .auth-badge.connected .dot { background: var(--accent-green); }
    .auth-badge.disconnected .dot { background: var(--accent-red); }

    .main { flex: 1; display: flex; }
    .sidebar {
      width: 260px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      padding: 1.5rem 0;
      flex-shrink: 0;
    }
    .sidebar-section { padding: 0 1rem; margin-bottom: 1.5rem; }
    .sidebar-section-title {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text-muted); padding: 0 0.5rem;
      margin-bottom: 8px;
    }
    .sidebar-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: var(--radius);
      cursor: pointer; font-size: 14px; color: var(--text-secondary);
      transition: all 0.15s;
      position: relative;
    }
    .sidebar-item:hover { background: var(--bg-card); color: var(--text-primary); }
    .sidebar-item.active {
      background: var(--accent-blue-dim);
      color: var(--accent-blue);
      font-weight: 500;
    }
    .sidebar-item .step-num {
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600;
      background: var(--bg-input); border: 1px solid var(--border);
    }
    .sidebar-item.active .step-num {
      background: var(--accent-blue); border-color: var(--accent-blue); color: white;
    }
    .sidebar-item.completed .step-num {
      background: var(--accent-green); border-color: var(--accent-green); color: white;
    }

    .content { flex: 1; padding: 2rem 3rem; max-width: 960px; }
    .content-wide { max-width: 1200px; }

    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .card-header { margin-bottom: 1rem; }
    .card-header h2 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .card-header h3 { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
    .card-header p { font-size: 14px; color: var(--text-secondary); }

    /* Form Elements */
    .form-group { margin-bottom: 1.25rem; }
    .form-label {
      display: block; font-size: 13px; font-weight: 500;
      color: var(--text-secondary); margin-bottom: 6px;
    }
    .form-hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    input[type="text"], input[type="password"], select, textarea {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 14px;
      transition: border-color 0.15s;
      outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent-blue); }
    select { cursor: pointer; }
    textarea { resize: vertical; min-height: 80px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: var(--radius);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 14px; font-weight: 500;
      cursor: pointer; border: 1px solid transparent;
      transition: all 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--accent-blue); color: white; }
    .btn-primary:hover:not(:disabled) { background: #2563eb; }
    .btn-success { background: var(--accent-green); color: white; }
    .btn-success:hover:not(:disabled) { background: #059669; }
    .btn-warning { background: var(--accent-amber); color: #1a1a1a; }
    .btn-danger { background: var(--accent-red); color: white; }
    .btn-danger:hover:not(:disabled) { background: #dc2626; }
    .btn-ghost {
      background: transparent; color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) { border-color: var(--text-muted); color: var(--text-primary); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }

    .btn-group { display: flex; gap: 8px; margin-top: 1.5rem; }

    /* Tier Cards */
    .tier-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin: 1rem 0; }
    .tier-card {
      background: var(--bg-input);
      border: 2px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .tier-card:hover { border-color: var(--text-muted); }
    .tier-card.selected { border-color: var(--accent-blue); background: var(--accent-blue-dim); }
    .tier-card .tier-icon { font-size: 28px; margin-bottom: 8px; }
    .tier-card .tier-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .tier-card .tier-desc { font-size: 12px; color: var(--text-secondary); }

    /* Compliance Grid */
    .compliance-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 1rem 0; }
    .compliance-chip {
      padding: 8px 12px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s;
      text-align: center;
    }
    .compliance-chip:hover { border-color: var(--text-muted); }
    .compliance-chip.selected { border-color: var(--accent-purple); background: rgba(139, 92, 246, 0.15); color: var(--accent-purple); }

    /* Toggle */
    .toggle-group { display: flex; flex-direction: column; gap: 8px; }
    .toggle-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .toggle-item label { font-size: 14px; cursor: pointer; }
    .toggle-switch {
      position: relative; width: 44px; height: 24px;
      background: var(--bg-secondary); border-radius: 12px;
      cursor: pointer; transition: background 0.2s;
      border: 1px solid var(--border);
    }
    .toggle-switch.active { background: var(--accent-blue); border-color: var(--accent-blue); }
    .toggle-switch .toggle-knob {
      position: absolute; top: 2px; left: 2px;
      width: 18px; height: 18px; border-radius: 50%;
      background: white; transition: transform 0.2s;
    }
    .toggle-switch.active .toggle-knob { transform: translateX(20px); }

    /* Plan/Diff View */
    .diff-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .diff-table th {
      text-align: left; padding: 8px 12px;
      background: var(--bg-secondary); border-bottom: 1px solid var(--border);
      font-weight: 600; color: var(--text-secondary); font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .diff-table td {
      padding: 10px 12px; border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    .diff-table tr:hover { background: var(--bg-card-hover); }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 600; text-transform: uppercase;
    }
    .badge-create { background: var(--accent-green-dim); color: var(--accent-green); }
    .badge-update { background: var(--accent-blue-dim); color: var(--accent-blue); }
    .badge-risk { background: var(--accent-red-dim); color: var(--accent-red); }
    .badge-category { background: rgba(139, 92, 246, 0.15); color: var(--accent-purple); }

    /* Alerts */
    .alert {
      padding: 12px 16px; border-radius: var(--radius);
      margin-bottom: 1rem; font-size: 14px;
      display: flex; align-items: flex-start; gap: 10px;
    }
    .alert-info { background: var(--accent-blue-dim); border: 1px solid rgba(59,130,246,0.3); }
    .alert-warning { background: var(--accent-amber-dim); border: 1px solid rgba(245,158,11,0.3); color: var(--accent-amber); }
    .alert-success { background: var(--accent-green-dim); border: 1px solid rgba(16,185,129,0.3); color: var(--accent-green); }
    .alert-danger { background: var(--accent-red-dim); border: 1px solid rgba(239,68,68,0.3); color: var(--accent-red); }

    /* Explainer */
    .explainer {
      background: var(--bg-input);
      border-left: 3px solid var(--accent-cyan);
      padding: 12px 16px;
      margin: 1rem 0;
      border-radius: 0 var(--radius) var(--radius) 0;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .explainer strong { color: var(--accent-cyan); }

    /* Compliance Evidence */
    .evidence-item {
      padding: 8px 12px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 6px;
      font-size: 13px;
    }
    .evidence-item .fw { color: var(--accent-purple); font-weight: 600; }
    .evidence-item .ctrl { color: var(--accent-cyan); }

    /* Audit Log */
    .log-entry {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      display: grid;
      grid-template-columns: 180px 120px 100px 1fr;
      gap: 8px;
    }
    .log-entry .ts { color: var(--text-muted); }
    .log-entry .action { color: var(--accent-cyan); font-weight: 500; }
    .log-entry .status-ok { color: var(--accent-green); }
    .log-entry .status-err { color: var(--accent-red); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* Loading spinner */
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ZPA placeholder */
    .placeholder-banner {
      background: linear-gradient(135deg, var(--bg-card), var(--bg-input));
      border: 1px dashed var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      text-align: center;
      color: var(--text-muted);
    }
    .placeholder-banner h3 { color: var(--text-secondary); margin-bottom: 8px; }

    /* Responsive */
    @media (max-width: 900px) {
      .sidebar { display: none; }
      .content { padding: 1rem; }
      .tier-grid { grid-template-columns: 1fr; }
      .compliance-grid { grid-template-columns: repeat(2, 1fr); }
      .form-row { grid-template-columns: 1fr; }
    }
    /* Policy Catalog */
    .catalog-tier { margin-bottom: 2rem; }
    .catalog-tier-header {
      display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem;
      background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius);
      cursor: pointer; user-select: none; font-weight: 600; font-size: 15px;
    }
    .catalog-tier-header:hover { background: var(--bg-card-hover); }
    .catalog-tier-header .arrow { transition: transform 0.2s; font-size: 11px; color: var(--text-muted); }
    .catalog-tier-header .arrow.open { transform: rotate(90deg); }
    .catalog-fw { margin: 0.5rem 0 0.5rem 1.5rem; }
    .catalog-fw-header {
      display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.75rem;
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      cursor: pointer; font-weight: 500; font-size: 13px;
    }
    .catalog-fw-header:hover { background: var(--bg-card-hover); }
    .catalog-policy-group { margin: 0.5rem 0 0.5rem 1rem; }
    .catalog-policy-header {
      display: flex; align-items: center; gap: 0.5rem; padding: 0.4rem 0.6rem;
      cursor: pointer; font-size: 13px; font-weight: 500; color: var(--accent-cyan);
    }
    .catalog-policy-header:hover { color: var(--accent-blue); }
    .catalog-rule {
      margin: 0.25rem 0 0.25rem 1.5rem; padding: 0.6rem 0.75rem;
      background: var(--bg-input); border: 1px solid var(--border); border-radius: 6px;
      font-size: 12px; line-height: 1.6;
    }
    .catalog-rule-name { font-weight: 600; color: var(--text-primary); font-size: 13px; }
    .catalog-rule-action {
      display: inline-block; padding: 1px 8px; border-radius: 4px; font-size: 11px;
      font-weight: 600; margin-left: 0.5rem;
    }
    .catalog-rule-action.BLOCK { background: var(--accent-red-dim); color: var(--accent-red); }
    .catalog-rule-action.ALLOW { background: var(--accent-green-dim); color: var(--accent-green); }
    .catalog-rule-action.CAUTION { background: var(--accent-amber-dim); color: var(--accent-amber); }
    .catalog-rule-action.INSPECT, .catalog-rule-action.DECRYPT { background: rgba(59,130,246,0.15); color: var(--accent-blue); }
    .catalog-rule-action.DO_NOT_DECRYPT { background: rgba(139,92,246,0.15); color: var(--accent-purple); }
    .catalog-rule-action.QUARANTINE, .catalog-rule-action.QUARANTINE_ISOLATE { background: rgba(139,92,246,0.15); color: var(--accent-purple); }
    .catalog-rule-detail { color: var(--text-secondary); margin-top: 2px; }
    .catalog-rule-cats { color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; font-size: 11px; margin-top: 3px; word-break: break-all; }
    .catalog-compliance-tag {
      display: inline-block; padding: 1px 6px; margin: 2px 3px 2px 0; border-radius: 3px;
      font-size: 10px; background: rgba(59,130,246,0.12); color: var(--accent-blue); font-family: 'IBM Plex Mono', monospace;
    }
    .catalog-count {
      display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 11px;
      background: var(--bg-input); color: var(--text-muted); margin-left: 0.5rem; font-weight: 400;
    }
    .catalog-loading { text-align: center; padding: 3rem; color: var(--text-muted); }
    .catalog-summary { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.25rem; }
    .catalog-summary-chip {
      font-size: 11px; padding: 2px 8px; border-radius: 4px;
      background: var(--bg-secondary); color: var(--text-secondary); border: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // ========================
    // Error Boundary — catches React render crashes and shows debug info instead of black screen
    // ========================
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null, errorInfo: null };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }
      componentDidCatch(error, errorInfo) {
        this.setState({ errorInfo });
        // Log to console for debugging
        console.error('[ZTP ErrorBoundary] Render crash caught:', error);
        console.error('[ZTP ErrorBoundary] Component stack:', errorInfo?.componentStack);
        // Also log to server error log
        try {
          const payload = {
            error: error?.message || String(error),
            stack: error?.stack,
            componentStack: errorInfo?.componentStack
          };
          console.error('[ZTP ErrorBoundary] Full details:', JSON.stringify(payload, null, 2));
        } catch(e) {}
      }
      render() {
        if (this.state.hasError) {
          return React.createElement('div', {
            style: { padding: '2rem', background: '#1a0000', border: '2px solid #ef4444',
                     borderRadius: '8px', margin: '1rem', color: '#fca5a5', fontFamily: 'monospace' }
          },
            React.createElement('h2', { style: { color: '#ef4444', marginBottom: '1rem' } }, '⚠ UI Render Error'),
            React.createElement('p', { style: { marginBottom: '1rem' } },
              'A React rendering error occurred. This is a bug — the data from the API could not be displayed. Details below:'),
            React.createElement('pre', {
              style: { fontSize: '12px', background: '#0a0a0a', padding: '1rem', borderRadius: '4px',
                       overflow: 'auto', maxHeight: '300px', whiteSpace: 'pre-wrap', color: '#fca5a5' }
            }, [
              'Error: ' + (this.state.error?.message || String(this.state.error)),
              '\n\nStack: ' + (this.state.error?.stack || 'N/A'),
              '\n\nComponent: ' + (this.state.errorInfo?.componentStack || 'N/A')
            ].join('')),
            React.createElement('p', { style: { marginTop: '1rem', fontSize: '12px', color: '#9ca3af' } },
              'Check the browser developer console (F12 → Console tab) for full details. ' +
              'Also check the server logs in ./logs/ for API-side errors.'),
            React.createElement('button', {
              onClick: () => this.setState({ hasError: false, error: null, errorInfo: null }),
              style: { marginTop: '1rem', padding: '8px 16px', background: '#ef4444', color: 'white',
                       border: 'none', borderRadius: '4px', cursor: 'pointer' }
            }, '🔄 Try Again')
          );
        }
        return this.props.children;
      }
    }

    // ========================
    // App Version
    // ========================
    const APP_VERSION = '1.5.2';
    const BUILD_DATE = '2026-03-30';

    // ========================
    // API Helper
    // ========================
    const api = {
      sessionId: null,
      async call(method, path, body = null) {
        const headers = { 'Content-Type': 'application/json' };
        if (this.sessionId) headers['X-Session-Id'] = this.sessionId;
        const opts = { method, headers };
        if (body) opts.body = JSON.stringify(body);
        const res = await fetch(`/api${path}`, opts);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        return data;
      }
    };

    // ========================
    // Wizard Steps
    // ========================
    const WIZARD_STEPS = [
      { id: 'tier', label: 'Security Tier', icon: '🛡️' },
      { id: 'compliance', label: 'Compliance', icon: '📋' },
      { id: 'customize', label: 'Customize', icon: '⚙️' },
      { id: 'review', label: 'Review Plan', icon: '🔍' },
      { id: 'apply', label: 'Apply', icon: '🚀' },
      { id: 'audit', label: 'Audit Log', icon: '📄' }
    ];

    // ========================
    // Main App
    // ========================
    function App() {
      // Navigation: activeModule = 'zia-wizard' | 'zia-bulk' | 'zcc' | 'about' | null
      const [activeModule, setActiveModule] = useState(null);
      const [step, setStep] = useState('connect');
      const [auth, setAuth] = useState({ connected: false, mode: null, cloud: null });
      const [config, setConfig] = useState({
        module: 'zia',
        tier: 'BALANCED',
        complianceFramework: null,
        prefix: 'ZTP',
        enableUrlFiltering: true,
        enableFirewall: true,
        enableSslInspection: true,
        enableMalwareProtection: true,
        enableAdvancedSettings: true,
        enableSandbox: true,
        enableDnsSecurity: true,
        enableFileTypeControl: true,
        enableCloudAppControl: true,
        enableDlp: true
      });
      const [template, setTemplate] = useState(null);
      const [plan, setPlan] = useState(null);
      const [applyResult, setApplyResult] = useState(null);
      const [auditLogs, setAuditLogs] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [completedSteps, setCompletedSteps] = useState(new Set());

      const markComplete = (s) => setCompletedSteps(prev => new Set([...prev, s]));

      const goTo = (s) => {
        setError(null);
        // Clear downstream state when going back in the wizard
        const stepOrder = ['tier', 'compliance', 'customize', 'review', 'apply', 'audit'];
        const targetIdx = stepOrder.indexOf(s);
        if (targetIdx >= 0) {
          if (targetIdx < stepOrder.indexOf('review')) { setPlan(null); }
          if (targetIdx < stepOrder.indexOf('apply')) { setApplyResult(null); }
          if (targetIdx < stepOrder.indexOf('customize')) { setTemplate(null); }
        }
        setStep(s);
      };

      const switchModule = (mod) => {
        setError(null);
        setActiveModule(mod);
        if (mod === 'zia-wizard') {
          // Reset wizard state so user can run a fresh deployment
          setStep('tier');
          setTemplate(null);
          setPlan(null);
          setApplyResult(null);
          setCompletedSteps(new Set());
        }
        else if (mod === 'zia-bulk') setStep('bulk-delete');
        else if (mod === 'zcc') setStep('zcc');
        else if (mod === 'about') setStep('about');
        else if (mod === 'catalog') setStep('catalog');
      };

      const showConnect = !auth.connected && activeModule !== 'catalog' && activeModule !== 'about';
      const showZiaWizard = auth.connected && activeModule === 'zia-wizard';
      const showZiaBulk = auth.connected && activeModule === 'zia-bulk';
      const showZcc = auth.connected && activeModule === 'zcc';
      const showAbout = activeModule === 'about';
      const showCatalog = activeModule === 'catalog';
      const ziaExpanded = activeModule === 'zia-wizard' || activeModule === 'zia-bulk';

      return (
        <div className="app">
          <header className="header">
            <div className="header-brand">
              <div className="logo" style={{fontSize:'16px'}}>🐼</div>
              <div><h1 style={{fontSize:'15px'}}>ZeroTrustPanda ZS Policy Wizard</h1></div>
              <span className="tag">v{APP_VERSION}</span>
            </div>
            <div className="header-right">
              <div className={`auth-badge ${auth.connected ? 'connected' : 'disconnected'}`}>
                <span className="dot"></span>
                {auth.connected ? `${auth.mode?.toUpperCase()} · ${auth.cloud}` : 'Not Connected'}
              </div>
              {auth.connected && (
                <button className="btn btn-ghost btn-sm" onClick={async () => {
                  try { await api.call('POST', '/auth/logout'); } catch(e) {}
                  api.sessionId = null; setAuth({ connected: false }); setActiveModule(null); setCompletedSteps(new Set()); goTo('connect');
                }}>Disconnect</button>
              )}
            </div>
          </header>
          <div className="main">
            <nav className="sidebar">
              <div className="sidebar-section">
                <div className="sidebar-item" style={{opacity: auth.connected ? 0.5 : 1}}
                  onClick={() => { if (!auth.connected) { setActiveModule(null); setStep('connect'); }}}>
                  <span className="step-num">{auth.connected ? '✓' : '🔌'}</span>
                  {auth.connected ? 'Connected' : 'Connect'}
                </div>
              </div>
              {auth.connected && (
                <div className="sidebar-section">
                  <div className="sidebar-section-title">Modules</div>
                  <div className={`sidebar-item ${ziaExpanded ? 'active' : ''}`}
                    onClick={() => switchModule('zia-wizard')} style={{cursor:'pointer', fontWeight: ziaExpanded ? 600 : 400}}>
                    <span className="step-num">🌐</span> Zscaler Internet Access
                  </div>
                  {ziaExpanded && (<>
                    <div className={`sidebar-item ${activeModule === 'zia-wizard' ? 'active' : ''}`}
                      onClick={() => switchModule('zia-wizard')} style={{paddingLeft:'2.2rem', fontSize:'12px', cursor:'pointer'}}>
                      <span className="step-num" style={{fontSize:'10px', width:'16px', height:'16px'}}>🛡️</span> Security Tier Wizard
                    </div>
                    <div className={`sidebar-item ${activeModule === 'zia-bulk' ? 'active' : ''}`}
                      onClick={() => switchModule('zia-bulk')} style={{paddingLeft:'2.2rem', fontSize:'12px', cursor:'pointer'}}>
                      <span className="step-num" style={{fontSize:'10px', width:'16px', height:'16px'}}>🗑️</span> Bulk Rule Manager
                    </div>
                  </>)}
                  {showZiaWizard && WIZARD_STEPS.map((s, i) => (
                    <div key={s.id} className={`sidebar-item ${step === s.id ? 'active' : ''} ${completedSteps.has(s.id) ? 'completed' : ''}`}
                      onClick={() => { if (completedSteps.has(s.id) || step === s.id) goTo(s.id); }}
                      style={{paddingLeft:'3.2rem', fontSize:'11px', cursor: completedSteps.has(s.id) ? 'pointer' : 'default'}}>
                      <span className="step-num" style={{fontSize:'9px', width:'15px', height:'15px'}}>{completedSteps.has(s.id) ? '✓' : i + 1}</span> {s.label}
                    </div>
                  ))}
                  <div className={`sidebar-item ${activeModule === 'zcc' ? 'active' : ''}`}
                    onClick={() => switchModule('zcc')} style={{cursor:'pointer'}}>
                    <span className="step-num">📱</span> Mobile Admin Portal
                  </div>
                  <div className="sidebar-item" style={{opacity:0.4, cursor:'default'}}>
                    <span className="step-num">🔒</span> Zscaler Private Access
                  </div>
                </div>
              )}
              <div className="sidebar-section" style={{marginTop:'auto'}}>
                <div className={`sidebar-item ${activeModule === 'catalog' ? 'active' : ''}`}
                  onClick={() => switchModule('catalog')} style={{cursor:'pointer', fontSize:'12px'}}>
                  <span className="step-num" style={{fontSize:'10px'}}>📖</span> Policy Catalog
                </div>
                <div className={`sidebar-item ${activeModule === 'about' ? 'active' : ''}`}
                  onClick={() => switchModule('about')} style={{cursor:'pointer', fontSize:'12px'}}>
                  <span className="step-num" style={{fontSize:'10px'}}>ℹ️</span> About
                </div>
              </div>
            </nav>
            <div className={`content ${step === 'review' ? 'content-wide' : ''}`}>
              {error && <div className="alert alert-danger">⚠ {error}</div>}
              {showConnect && (<ConnectStep auth={auth} setAuth={setAuth} setError={setError} loading={loading} setLoading={setLoading}
                onComplete={() => { markComplete('connect'); setActiveModule(null); setStep('select'); }} />)}
              {auth.connected && !activeModule && (
                <div className="card">
                  <div className="card-header"><h2>🐼 Welcome to ZeroTrustPanda</h2><p>Select a module from the sidebar or choose below.</p></div>
                  <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'1rem', margin:'1rem 0'}}>
                    <div className="tier-card" onClick={() => switchModule('zia-wizard')} style={{cursor:'pointer'}}>
                      <div className="tier-icon">🌐</div><div className="tier-name">ZIA Security Wizard</div>
                      <div className="tier-desc">Deploy URL Filtering, Firewall, SSL, Sandbox, DNS, File Type, Cloud App Control, and DLP policies.</div>
                    </div>
                    <div className="tier-card" onClick={() => switchModule('zcc')} style={{cursor:'pointer'}}>
                      <div className="tier-icon">📱</div><div className="tier-name">Mobile Admin Portal</div>
                      <div className="tier-desc">Configure ZCC Forwarding Profiles and App Profiles with best-practice settings.</div>
                    </div>
                    <div className="tier-card" onClick={() => switchModule('catalog')} style={{cursor:'pointer'}}>
                      <div className="tier-icon">📖</div><div className="tier-name">Policy Catalog</div>
                      <div className="tier-desc">Browse every rule across all tiers and compliance frameworks before deploying. Full rule details and compliance mappings.</div>
                    </div>
                    <div className="tier-card" onClick={() => switchModule('about')} style={{cursor:'pointer'}}>
                      <div className="tier-icon">ℹ️</div><div className="tier-name">About</div>
                      <div className="tier-desc">Documentation, modules, compliance frameworks, version history.</div>
                    </div>
                  </div>
                </div>
              )}
              {showCatalog && (<CatalogStep />)}
              {showAbout && (
                <div className="card">
                  <div className="card-header"><h2>🐼 ZeroTrustPanda ZS Policy Wizard</h2><p>Automated Zscaler policy configuration for healthcare and enterprise.</p></div>
                  <div style={{fontSize:'13px', color:'var(--text-secondary)', lineHeight:'1.8'}}>
                    <h3 style={{fontSize:'15px', color:'var(--accent-cyan)', margin:'1rem 0 0.5rem'}}>What This Wizard Does</h3>
                    <p>Automates Zscaler security policy deployment based on industry best practices and compliance frameworks. Select a tier, choose compliance, deploy a complete policy set in minutes.</p>
                    <h3 style={{fontSize:'15px', color:'var(--accent-cyan)', margin:'1.5rem 0 0.5rem'}}>ZIA Security Tier Wizard</h3>
                    <p>Deploys policies across 7 areas (4 tiers: Strict, Balanced, Permissive, Zero Trust Hospital):</p>
                    <div style={{paddingLeft:'1rem'}}>
                      <div>• <strong>URL Filtering</strong> — Block legal liability, security risk, bandwidth/productivity categories</div>
                      <div>• <strong>Cloud Firewall</strong> — Network application controls (WEBSEARCH, WEB, ENTERPRISE, P2P, etc.)</div>
                      <div>• <strong>SSL/TLS Inspection</strong> — Decrypt/bypass with health, finance, government exemptions</div>
                      <div>• <strong>Cloud Sandbox</strong> — Quarantine Office/PDF, scan executables, AI Instant Verdict</div>
                      <div>• <strong>DNS Security</strong> — Block malicious DNS categories and 21+ DNS tunnel types</div>
                      <div>• <strong>File Type Control</strong> — Block database uploads, password-protected archives, scripts</div>
                      <div>• <strong>Cloud App Control</strong> — Restrict DoH, file sharing, webmail, streaming, IM, AI/ML</div>
                    </div>
                    <h3 style={{fontSize:'15px', color:'var(--accent-cyan)', margin:'1.5rem 0 0.5rem'}}>Bulk Rule Manager</h3>
                    <p>View and delete rules across all ZIA policy categories for cleanup after testing.</p>
                    <h3 style={{fontSize:'15px', color:'var(--accent-cyan)', margin:'1.5rem 0 0.5rem'}}>Mobile Admin Portal (ZCC)</h3>
                    <p>Configure ZCC Forwarding Profiles and Windows App Profiles. Read supported; write requires ZCC API write permissions.</p>
                    <h3 style={{fontSize:'15px', color:'var(--accent-cyan)', margin:'1.5rem 0 0.5rem'}}>Compliance</h3>
                    <p>HIPAA, HITRUST CSF, NIST 800-53, NIST 800-171, PCI-DSS, CJIS, SOX, FERPA, GDPR</p>
                    <h3 style={{fontSize:'15px', color:'var(--accent-cyan)', margin:'1.5rem 0 0.5rem'}}>Version History</h3>
                    <div style={{paddingLeft:'1rem', fontSize:'12px'}}>
                      <div><strong>v1.5.2</strong> — DLP rules shown in Review step, wizard state resets between runs for multi-deploy sessions</div>
                      <div><strong>v1.5.1</strong> — Multi-user sessions (50 concurrent, 1hr TTL), Policy Catalog browser (no auth needed)</div>
                      <div><strong>v1.5.0</strong> — Data Loss Prevention module (dictionary-first, 14 rule defs, 9 compliance frameworks)</div>
                      <div><strong>v1.4.0</strong> — UI restructure, ZeroTrustPanda branding, firewall nwApplications fix, About page</div>
                      <div><strong>v1.3.0</strong> — Mobile Admin Portal (ZCC), OneAPI-only auth</div>
                      <div><strong>v1.2.x</strong> — Sandbox, DNS, File Type, Cloud App Control, Bulk Rule Manager</div>
                      <div><strong>v1.0-1.1</strong> — URL Filtering, Firewall, SSL, Malware Protection, Error boundary</div>
                    </div>
                  </div>
                </div>
              )}
              {showZiaWizard && step === 'tier' && (<TierStep config={config} setConfig={setConfig}
                onNext={() => { markComplete('tier'); if (config.tier === 'ZTH_EBOOK') { setConfig(c => ({...c, complianceFramework: null})); markComplete('compliance'); goTo('customize'); } else { goTo('compliance'); } }} />)}
              {showZiaWizard && step === 'compliance' && (<ComplianceStep config={config} setConfig={setConfig}
                onNext={() => { markComplete('compliance'); goTo('customize'); }} onBack={() => goTo('tier')} />)}
              {showZiaWizard && step === 'customize' && (<CustomizeStep config={config} setConfig={setConfig}
                setTemplate={setTemplate} setError={setError} loading={loading} setLoading={setLoading}
                onNext={() => { markComplete('customize'); goTo('review'); }} onBack={() => goTo('compliance')} />)}
              {showZiaWizard && step === 'review' && (<ReviewStep template={template} plan={plan} setPlan={setPlan}
                auth={auth} setError={setError} loading={loading} setLoading={setLoading}
                onApply={() => { markComplete('review'); goTo('apply'); }} onBack={() => goTo('customize')} />)}
              {showZiaWizard && step === 'apply' && (<ApplyStep template={template} plan={plan}
                applyResult={applyResult} setApplyResult={setApplyResult}
                setError={setError} loading={loading} setLoading={setLoading}
                onNext={() => { markComplete('apply'); goTo('audit'); }} />)}
              {showZiaWizard && step === 'audit' && (<AuditStep auditLogs={auditLogs} setAuditLogs={setAuditLogs} setError={setError} />)}
              {showZiaBulk && (<BulkDeleteStep setError={setError} loading={loading} setLoading={setLoading} />)}
              {showZcc && (<MobileAdminStep setError={setError} loading={loading} setLoading={setLoading} config={config} />)}
            </div>
          </div>
        </div>
      );
    }

    // ========================
    // Step: Connect
    // ========================
    function ConnectStep({ auth, setAuth, setError, loading, setLoading, onComplete }) {
      const [form, setForm] = useState({
        clientId: '', clientSecret: '', vanityDomain: '', cloud: ''
      });

      const handleConnect = async () => {
        setLoading(true); setError(null);
        try {
          const result = await api.call('POST', '/auth/oneapi', {
            clientId: form.clientId, clientSecret: form.clientSecret,
            vanityDomain: form.vanityDomain, cloud: form.cloud || undefined
          });
          api.sessionId = result.sessionId;
          setAuth({ connected: true, mode: 'oneapi', cloud: form.vanityDomain });
          onComplete();
        } catch (e) {
          setError(e.message);
        }
        setLoading(false);
      };

      return (
        <div>
          <div className="card">
            <div className="card-header">
              <h2>Connect to Zscaler</h2>
              <p>Authenticate using OneAPI (OAuth2) credentials from ZIdentity. This provides access to ZIA, ZCC, and other Zscaler services through a single token.</p>
            </div>

            <div className="explainer">
              <strong>Prerequisites:</strong> You need an API client configured in ZIdentity → Integration → API Clients
              with scopes for ZIA and ZCC. The Client ID and Client Secret are generated there.
            </div>

            <div>
              <div className="form-group">
                <label className="form-label">Vanity Domain</label>
                <input type="text" value={form.vanityDomain} placeholder="yourcompany"
                  onChange={e => setForm({...form, vanityDomain: e.target.value})} />
                <div className="form-hint">Your ZIdentity vanity domain (e.g., "acme" for acme.zslogin.net)</div>
              </div>
              <div className="form-group">
                <label className="form-label">Client ID</label>
                <input type="text" value={form.clientId} placeholder="OAuth2 Client ID"
                  onChange={e => setForm({...form, clientId: e.target.value})} />
              </div>
              <div className="form-group">
                <label className="form-label">Client Secret</label>
                <input type="password" value={form.clientSecret} placeholder="OAuth2 Client Secret"
                  onChange={e => setForm({...form, clientSecret: e.target.value})} />
              </div>
              <div className="form-group">
                <label className="form-label">Cloud (optional)</label>
                <input type="text" value={form.cloud} placeholder="Leave blank for production"
                  onChange={e => setForm({...form, cloud: e.target.value})} />
                <div className="form-hint">Only needed for non-production environments (e.g., beta)</div>
              </div>
            </div>

            <div className="btn-group">
              <button className="btn btn-primary" onClick={handleConnect} disabled={loading}>
                {loading ? <><span className="spinner"></span> Connecting...</> : 'Connect & Authenticate'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ========================
    // Step: Module Select
    // ========================
    function ModuleStep({ config, setConfig, onNext }) {
      const [schema, setSchema] = useState(null);
      const [schemaLoading, setSchemaLoading] = useState(false);
      const [schemaError, setSchemaError] = useState(null);

      const fetchSchema = async () => {
        setSchemaLoading(true); setSchemaError(null);
        try {
          const data = await api.call('GET', '/diag/schema');
          setSchema(data);
        } catch (e) { setSchemaError(e.message); }
        setSchemaLoading(false);
      };

      return (
        <div>
          <div className="card">
            <div className="card-header">
              <h2>Select Modules</h2>
              <p>Choose which Zscaler modules to configure. The MVP focuses on ZIA.</p>
            </div>

            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'1rem', margin:'1rem 0'}}>
              <div className={`tier-card selected`} style={{borderColor:'var(--accent-green)'}}>
                <div className="tier-icon">🌐</div>
                <div className="tier-name">Zscaler Internet Access</div>
                <div className="tier-desc">URL Filtering, Cloud Firewall, SSL Inspection, DLP, Sandbox, Cloud App Control, Malware Protection</div>
                <div style={{marginTop:'8px', color:'var(--accent-green)', fontSize:'12px', fontWeight:600}}>✓ ACTIVE</div>
              </div>
              <div className="placeholder-banner" style={{border:'1px dashed var(--border)'}}>
                <div className="tier-icon" style={{fontSize:'28px'}}>🔒</div>
                <h3>Zscaler Private Access</h3>
                <div className="tier-desc">App Segments, Access Policies, Wildcard Rules — Coming in a future release</div>
                <div style={{marginTop:'8px', color:'var(--text-muted)', fontSize:'12px'}}>PLACEHOLDER</div>
              </div>
            </div>

            <div className="card" style={{background:'var(--bg-input)', marginTop:'1rem'}}>
              <div className="card-header">
                <h3>API Schema Discovery</h3>
                <p>Fetch a sample of your tenant's current rules to verify API connectivity and field formats.</p>
              </div>
              <button className="btn btn-ghost btn-sm" onClick={fetchSchema} disabled={schemaLoading}>
                {schemaLoading ? <><span className="spinner"></span> Fetching...</> : '🔍 Fetch Tenant Schema'}
              </button>
              {schemaError && <div className="alert alert-danger" style={{marginTop:'8px'}}>⚠ {schemaError}</div>}
              {schema && (
                <div style={{marginTop:'12px', maxHeight:'400px', overflowY:'auto'}}>
                  {Object.entries(schema).map(([key, val]) => (
                    <div key={key} style={{marginBottom:'12px'}}>
                      <div style={{fontWeight:600, fontSize:'13px', color:'var(--accent-cyan)', marginBottom:'4px'}}>{key}</div>
                      {val.error ? (
                        <div style={{fontSize:'12px', color:'var(--accent-red)'}}>Error: {val.error}</div>
                      ) : (
                        <pre style={{
                          fontSize:'11px', fontFamily:'IBM Plex Mono', color:'var(--text-secondary)',
                          background:'var(--bg-primary)', padding:'8px', borderRadius:'4px',
                          overflow:'auto', maxHeight:'200px', whiteSpace:'pre-wrap', wordBreak:'break-all'
                        }}>{JSON.stringify(val, null, 2)}</pre>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>

            <div className="btn-group">
              <button className="btn btn-primary" onClick={onNext}>Continue with ZIA →</button>
            </div>
          </div>
        </div>
      );
    }

    // ========================
    // Step: Security Tier
    // ========================

          id: 'STRICT', icon: '🔒', name: 'Strict',

        { id: 'HIPAA', label: 'HIPAA', desc: 'Healthcare' },

        { id: 'NIST_800_53', label: 'NIST 800-53', desc: 'Federal Systems' },
        { id: 'NIST_800_171', label: 'NIST 800-171', desc: 'CUI Protection' },
        { id: 'PCI', label: 'PCI DSS', desc: 'Payment Cards' },
        { id: 'CJIS', label: 'CJIS', desc: 'Criminal Justice' },
        { id: 'SOX', label: 'SOX', desc: 'Financial Reporting' },
        { id: 'FERPA', label: 'FERPA', desc: 'Education Records' },

      return (
        <div>
          <div className="card">
            <div className="card-header">
              <h2>Compliance Framework (Optional)</h2>
              <p>Select a regulatory framework to map policies to specific compliance controls. This generates evidence documentation showing which ZIA policy satisfies which control requirement.</p>
            </div>

            <div className="explainer">
              <strong>Why you should care:</strong> Compliance mapping creates an audit trail that links each
              ZIA policy rule to a specific regulatory control. This documentation is invaluable during audits
              and can significantly reduce the effort required to demonstrate compliance.
            </div>

            <div className="compliance-grid">
              <div
                className={`compliance-chip ${!config.complianceFramework ? 'selected' : ''}`}
                onClick={() => setConfig({...config, complianceFramework: null})}

              {frameworks.map(f => (
                <div key={f.id}
                  className={`compliance-chip ${config.complianceFramework === f.id ? 'selected' : ''}`}
                  onClick={() => setConfig({...config, complianceFramework: f.id})}
                >
                  <div style={{fontWeight:600}}>{f.label}</div>

              <button className="btn btn-ghost" onClick={onBack}>← Back</button>

          </div>
        </div>

    // ========================
    // Step: Customize
    // ========================
    function CustomizeStep({ config, setConfig, setTemplate, setError, loading, setLoading, onNext, onBack }) {
      const toggles = [
        { key: 'enableUrlFiltering', label: 'URL Filtering', desc: 'Block/allow web categories, create custom URL rules' },
        { key: 'enableFirewall', label: 'Cloud Firewall', desc: 'Network-level firewall filtering rules' },
        { key: 'enableSslInspection', label: 'SSL/TLS Inspection', desc: 'Inspect encrypted traffic for threats' },
        { key: 'enableSandbox', label: 'Cloud Sandbox', desc: 'Quarantine & scan unknown files (Office, PDF, Executables)' },
        { key: 'enableDnsSecurity', label: 'DNS Security', desc: 'Block malicious DNS categories and DNS tunnels' },
        { key: 'enableFileTypeControl', label: 'File Type Control', desc: 'Block risky file types (executables, scripts, archives, databases)' },
        { key: 'enableCloudAppControl', label: 'Cloud App Control', desc: 'Control SaaS apps (DoH, file sharing, webmail, AI/ML, social, IM)' },
        { key: 'enableDlp', label: 'Data Loss Prevention', desc: 'DLP policy rules mapped to compliance engines (HIPAA, PCI, GDPR, etc.). Action=Allow with Zscaler Incident Receiver.' },
        { key: 'enableMalwareProtection', label: 'Malware & Threat Protection', desc: 'Anti-virus, anti-spyware, botnet protection settings' },
        { key: 'enableAdvancedSettings', label: 'Advanced Cloud Settings', desc: 'HTTP tunnel control, domain fronting, authentication settings' }
      ];

      const handleGenerate = async () => {
        setLoading(true); setError(null);
        try {
          const tmpl = await api.call('POST', '/templates/generate', config);
          setTemplate(tmpl);
          onNext();
        } catch (e) {
          setError(e.message);
        }
        setLoading(false);
      };

      return (
        <div>
          <div className="card">
            <div className="card-header">
              <h2>Customize Template</h2>
              <p>Fine-tune the naming prefix and which policy areas to include.</p>
            </div>

            <div className="form-group">
              <label className="form-label">Naming Prefix</label>
              <input type="text" value={config.prefix}
                onChange={e => setConfig({...config, prefix: e.target.value.replace(/[^A-Za-z0-9_-]/g, '')})}
                placeholder="ZTP" />
              <div className="form-hint">
                All created objects will be named with this prefix (e.g., {config.prefix}-Block-Legal-Liability).
                Letters, numbers, hyphens, and underscores only.
              </div>
            </div>

            <div className="form-group">
              <label className="form-label">Policy Modules</label>
              <div className="toggle-group">
                {toggles.map(t => (
                  <div className="toggle-item" key={t.key}>
                    <div>
                      <label onClick={() => setConfig({...config, [t.key]: !config[t.key]})}>{t.label}</label>
                      <div className="form-hint">{t.desc}</div>
                    </div>
                    <div className={`toggle-switch ${config[t.key] ? 'active' : ''}`}
                      onClick={() => setConfig({...config, [t.key]: !config[t.key]})}>
                      <div className="toggle-knob"></div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <div className="alert alert-info">
              ℹ Template: <strong>{config.prefix}-{config.complianceFramework || 'General'}-{config.tier}</strong>

            <div className="btn-group">
              <button className="btn btn-ghost" onClick={onBack}>← Back</button>
              <button className="btn btn-primary" onClick={handleGenerate} disabled={loading}>
                {loading ? <><span className="spinner"></span> Generating...</> : 'Generate Template & Review →'}
              </button>

    // ========================
    // Step: Review / Plan
    // ========================
    function ReviewStep({ template, plan, setPlan, auth, setError, loading, setLoading, onApply, onBack }) {
      const [tab, setTab] = useState('policies');

      const runDryRun = async () => {
        setLoading(true); setError(null);
        try {
          const result = await api.call('POST', '/plan/dryrun', { template });
          setPlan(result);
          setTab('diff');
        } catch (e) {
          setError(e.message);
        }
        setLoading(false);
      };

      if (!template) return <div className="alert alert-warning">No template generated. Go back to Customize step.</div>;

      const allPolicies = [
        ...(template.policies.urlFiltering || []).map(r => ({...r, category: 'URL Filtering'})),
        ...(template.policies.firewallFiltering || []).map(r => ({...r, category: 'Firewall'})),
        ...(template.policies.sslInspection || []).map(r => ({...r, category: 'SSL Inspection'})),
        ...(template.policies.sandbox || []).map(r => ({...r, category: 'Sandbox', action: r.baRuleAction})),
        ...(template.policies.dnsSecurity || []).map(r => ({...r, category: 'DNS Security'})),
        ...(template.policies.fileTypeControl || []).map(r => ({...r, category: 'File Type Control', action: r.filteringAction})),
        ...(template.policies.cloudAppControl || []).map(r => ({...r, category: 'Cloud App Control', action: (r.actions||[]).join(', ')})),
        ...(template.policies.dlp || []).map(r => ({...r, category: 'Data Loss Prevention', action: r.action || 'ALLOW'})),

                onClick={() => setTab('policies')}>Policy Rules ({allPolicies.length})</button>
              <button className={`btn btn-sm ${tab==='checklist' ? 'btn-primary' : 'btn-ghost'}`}
                onClick={() => setTab('checklist')}>Checklist</button>
              <button className={`btn btn-sm ${tab==='compliance' ? 'btn-primary' : 'btn-ghost'}`}
                onClick={() => setTab('compliance')}>Compliance Evidence</button>
              <button className={`btn btn-sm ${tab==='diff' ? 'btn-primary' : 'btn-ghost'}`}

            {tab === 'policies' && (
              <div style={{overflowX:'auto'}}>
                <table className="diff-table">

                    <tr>
                      <th>Order</th>
                      <th>Category</th>
                      <th>Rule Name</th>
                      <th>Action</th>
                      <th>Description</th>

                  </thead>
                  <tbody>
                    {allPolicies.map((r, i) => (
                      <tr key={i}>
                        <td>{r.order}</td>
                        <td><span className="badge badge-category">{r.category}</span></td>
                        <td style={{fontFamily:'IBM Plex Mono', fontSize:'12px'}}>{r.name}</td>

                          <span className={`badge ${r.action==='BLOCK'||r.action==='BLOCK_DROP'||r.action==='BLOCK_ICMP_UNREACHABLE' ? 'badge-risk' : 'badge-create'}`}>
                            {r.action}

                        <td style={{fontSize:'12px', color:'var(--text-secondary)'}}>{r.description}</td>
                      </tr>
                    ))}
                    {template.policies.malwareProtection && (
                      <tr>
                        <td>—</td>
                        <td><span className="badge badge-category">Malware</span></td>
                        <td style={{fontFamily:'IBM Plex Mono', fontSize:'12px'}}>{template.policies.malwareProtection.name}</td>
                        <td><span className="badge badge-update">CONFIG</span></td>
                        <td style={{fontSize:'12px', color:'var(--text-secondary)'}}>Malware & Advanced Threat Protection settings</td>
                      </tr>
                    )}
                    {template.policies.advancedSettings && (
                      <tr>
                        <td>—</td>
                        <td><span className="badge badge-category">Advanced</span></td>
                        <td style={{fontFamily:'IBM Plex Mono', fontSize:'12px'}}>{template.policies.advancedSettings.name}</td>
                        <td><span className="badge badge-update">CONFIG</span></td>
                        <td style={{fontSize:'12px', color:'var(--text-secondary)'}}>Advanced cloud settings configuration</td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
            )}

            {tab === 'checklist' && (
              <div>
                {template.implementationChecklist.map((item, i) => (
                  <div key={i} style={{
                    display:'flex', alignItems:'center', gap:'10px',
                    padding:'8px 12px', borderBottom:'1px solid var(--border)',

                      width:'20px', height:'20px', borderRadius:'4px',
                      border:'1px solid var(--border)', display:'flex',
                      alignItems:'center', justifyContent:'center', fontSize:'10px',
                      flexShrink:0
                    }}>
                      {item.manual ? '✋' : '○'}
                    </span>
                    <span className="badge badge-category" style={{fontSize:'10px', flexShrink:0}}>{item.category}</span>
                    <span>{item.task}</span>
                    {item.manual && <span style={{fontSize:'11px', color:'var(--accent-amber)'}}>MANUAL</span>}
                  </div>
                ))}
              </div>
            )}

            {tab === 'compliance' && (
              <div>
                {!template.metadata.complianceFramework ? (
                  <div className="alert alert-info">No compliance framework selected. Go back to select one for evidence mapping.</div>
                ) : (
                  <div>
                    <h3 style={{fontSize:'14px', marginBottom:'1rem'}}>
                      {template.metadata.complianceFramework.name} Compliance Evidence
                    </h3>
                    {allPolicies.filter(r => r.complianceMapping?.length > 0).map((r, i) => (
                      <div key={i} className="evidence-item">
                        <div style={{fontWeight:600, marginBottom:'4px'}}>{r.name}</div>
                        {r.complianceMapping.map((m, j) => (
                          <div key={j} style={{fontSize:'12px'}}>
                            <span className="fw">{m.framework}</span> →
                            <span className="ctrl"> {m.id}: {m.name}</span>

            {tab === 'diff' && (
              <div>
                {loading ? (
                  <div style={{textAlign:'center', padding:'2rem'}}><div className="spinner" style={{margin:'0 auto'}}></div><p style={{marginTop:'8px', color:'var(--text-muted)'}}>Running dry run against your tenant...</p></div>
                ) : plan ? (
                  <div>
                    <div className="alert alert-info">
                      ℹ Plan Summary: <strong>{plan.summary.creates} creates</strong>, <strong>{plan.summary.updates} updates</strong>
                      {plan.summary.riskyActions > 0 && <>, <span style={{color:'var(--accent-red)'}}>{plan.summary.riskyActions} risky actions</span></>}
                    </div>
                    {plan.warnings?.length > 0 && plan.warnings.map((w,i) => (
                      <div key={i} className="alert alert-warning">⚠ {w}</div>
                    ))}
                    <table className="diff-table">
                      <thead>
                        <tr>

                          <th>Category</th>
                          <th>Rule Name</th>
                          <th>Current</th>
                          <th>Proposed</th>

                    </button>
                    <p className="form-hint" style={{marginTop:'8px'}}>This will read your current configuration and show what would change.</p>
                  </div>
                )}
              </div>
            )}

            <div className="btn-group">
              <button className="btn btn-ghost" onClick={onBack}>← Back</button>
              {!auth.connected ? (
                <div className="alert alert-warning" style={{margin:0}}>Connect to ZIA first to apply changes</div>
              ) : (
                <button className="btn btn-success" onClick={onApply}>
                  Proceed to Apply →
                </button>
              )}
            </div>
          </div>
        </div>
      );
